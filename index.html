<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TRON</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000010;
      font-family: 'Courier New', Courier, monospace;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
      color: #00f0ff;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-shadow: 0 0 8px #00f0ff;
      user-select: none;
    }

    #stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      opacity: 0.45;
      font-size: 8px;
      letter-spacing: 0.15em;
    }

    .stat-value {
      font-size: 13px;
      font-weight: bold;
    }

    #audio-controls {
      display: flex;
      gap: 6px;
      pointer-events: all;
      flex-shrink: 0;
    }

    .audio-btn {
      background: transparent;
      border: 1px solid #00f0ff33;
      color: #00f0ff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 8px;
      letter-spacing: 0.12em;
      padding: 4px 7px;
      cursor: pointer;
      text-shadow: 0 0 6px #00f0ff;
      transition: border-color 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .audio-btn:hover,
    .audio-btn:focus { border-color: #00f0ffaa; outline: none; }

    .audio-btn.muted {
      opacity: 0.25;
      text-decoration: line-through;
    }

    #banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 26px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      /* Dark pill keeps text legible over bright neon trails */
      background: rgba(0, 0, 10, 0.82);
      padding: 14px 28px;
      border-radius: 4px;
    }

    #banner.lose {
      color: #ff3c00;
      text-shadow: 0 0 10px #ff3c00, 0 0 24px #ff3c0099;
      border: 1px solid #ff3c0044;
    }

    #banner.visible { opacity: 1; }

    @media (max-width: 480px) {
      #stats { gap: 10px; }
      .stat-value { font-size: 11px; }
      .stat-label { font-size: 7px; }
      #banner { font-size: 18px; letter-spacing: 0.2em; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div id="stats">
      <div class="stat">
        <span class="stat-label">PTS</span>
        <span class="stat-value" id="stat-points">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">BEST</span>
        <span class="stat-value" id="stat-best">0s</span>
      </div>
      <div class="stat">
        <span class="stat-label">GAMES</span>
        <span class="stat-value" id="stat-games">0</span>
      </div>
    </div>
    <div id="audio-controls">
      <button class="audio-btn" id="btn-sfx" aria-label="Toggle sound effects">SFX</button>
      <button class="audio-btn" id="btn-music" aria-label="Toggle music">MUS</button>
    </div>
  </div>

  <div id="banner" role="status" aria-live="polite"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
